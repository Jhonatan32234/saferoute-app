name: saferoute_app
description: SafeRoute - Navegación Segura para Flotas en Chiapas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1

  # Red
  http: ^1.2.0
  web_socket_channel: ^3.0.3

  # Almacenamiento seguro
  flutter_secure_storage: ^10.3.1

  # Mapas
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Ubicación
  geolocator: ^14.0.3

  # Variables de entorno
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true
  assets:
    - .env
    - assets/
